version: '3.8'

services:
  app:
    build: .
    container_name: knowledge-engine-app
    restart: always
    env_file:
      - .env
    volumes:
      - rss_data:/app/rss_feeds.db
      - ${VAULT_PATH}:/mnt/obsidian-vault
    ports:
      - "8501:8501"
    networks:
      - knowledge-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build: .
    container_name: knowledge-engine-api
    restart: always
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    volumes:
      - rss_data:/app/rss_feeds.db
      - ${VAULT_PATH}:/mnt/obsidian-vault
    ports:
      - "8000:8000"
    networks:
      - knowledge-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: knowledge-engine-tunnel
    restart: always
    command: tunnel run
    env_file:
      - .env
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - knowledge-net
    depends_on:
      - app

networks:
  knowledge-net:
    driver: bridge

volumes:
  rss_data:
