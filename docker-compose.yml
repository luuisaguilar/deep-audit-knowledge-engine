version: '3.8'

services:

  # ── Landing Page (Next.js) ───────────────────────────────
  landing:
    build:
      context: /opt/deep-audit-landing
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_KEY}
    container_name: knowledge-landing
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=
    networks:
      - knowledge-net

  # ── Streamlit App (admin / power user) ──────────────────
  app:
    build: .
    container_name: knowledge-engine-app
    restart: always
    env_file:
      - .env
    environment:
      - RSS_DB_PATH=/app/db_data/rss_feeds.db
    volumes:
      - rss_data:/app/db_data
      - ${VAULT_PATH}:/mnt/obsidian-vault
    networks:
      - knowledge-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── FastAPI (backend compartido) ────────────────────────
  api:
    build: .
    container_name: knowledge-engine-api
    restart: always
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      - RSS_DB_PATH=/app/db_data/rss_feeds.db
    volumes:
      - rss_data:/app/db_data
      - ${VAULT_PATH}:/mnt/obsidian-vault
    networks:
      - knowledge-net

  # ── Nginx (reverse proxy) ───────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: knowledge-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - landing
      - app
      - api
    networks:
      - knowledge-net

  # ── Cloudflare Tunnel ───────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: knowledge-engine-tunnel
    restart: always
    command: tunnel run
    env_file:
      - .env
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - knowledge-net
    depends_on:
      - nginx

networks:
  knowledge-net:
    driver: bridge

volumes:
  rss_data:
