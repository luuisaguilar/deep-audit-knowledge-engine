events {}

http {
    upstream nextjs    { server landing:3000; }
    upstream fastapi   { server api:8000; }
    upstream streamlit { server app:8501; }

    server {
        listen 80;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none';" always;

        # FastAPI — endpoints de la landing y de n8n
        location /analyze/ {
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            proxy_pass http://fastapi;
        }

        # Streamlit — panel admin (solo acceso interno via SSH tunnel)
        # Para acceder: ssh -L 8501:localhost:8501 user@tailscale-ip
        location /admin/ {
            deny all;
            return 403;
        }

        location /admin/_stcore/stream {
            deny all;
            return 403;
        }

        # Next.js — todo lo demás
        location / {
            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # WebSocket para Next.js HMR (dev)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
