events {}

http {
    upstream nextjs    { server landing:3000; }
    upstream fastapi   { server api:8000; }
    upstream streamlit { server app:8501; }

    server {
        listen 80;

        # FastAPI — endpoints de la landing y de n8n
        location /analyze/ {
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            proxy_pass http://fastapi;
        }

        # Streamlit — panel admin (solo acceso interno via SSH tunnel)
        # Para acceder: ssh -L 8501:localhost:8501 user@tailscale-ip
        location /admin/ {
            deny all;
            return 403;
        }

        location /admin/_stcore/stream {
            deny all;
            return 403;
        }

        # Next.js — todo lo demás
        location / {
            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # WebSocket para Next.js HMR (dev)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
